<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Insight Dashboard - 설정 파일 생성기</title>
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
            --focus-ring: rgba(79, 70, 229, 0.2);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 2rem 1rem;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background-color: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            padding: 2rem;
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            font-size: 1.5rem;
            margin-top: 0;
            margin-bottom: 0.5rem;
            color: var(--primary-color);
        }

        p.description {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .section {
            padding-bottom: 1.5rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .section:last-of-type {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        h2 {
            font-size: 1.1rem;
            margin-top: 0;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.4rem;
            font-size: 0.9rem;
        }

        .hint {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
        }

        input[type="text"],
        input[type="password"],
        input[type="number"],
        select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.95rem;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px var(--focus-ring);
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        button {
            width: 100%;
            padding: 1rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            margin-top: 2rem;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        .icon {
            font-size: 1.2rem;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>설정 파일(config.json) 생성기</h1>
        <p class="description">
            아래 양식을 채우고 다운로드 버튼을 누르면 <strong>config.json</strong> 파일이 만들어집니다. <br />
            다운로드된 파일을 프로그램이 있는 폴더에 넣어주세요.
        </p>

        <form id="configForm">
            <!-- 이메일 설정 -->
            <div class="section">
                <h2><span class="icon">✉️</span> 이메일 (IMAP) 설정</h2>

                <div class="grid-2">
                    <div class="form-group">
                        <label for="server">메일 서버 (IMAP)</label>
                        <input type="text" id="server" value="imap.naver.com" required>
                    </div>
                    <div class="form-group">
                        <label for="port">포트 (일반적으로 993)</label>
                        <input type="number" id="port" value="993" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">이메일 주소</label>
                    <input type="text" id="email" placeholder="예: user@naver.com" required>
                </div>

                <div class="form-group">
                    <label for="password">앱 비밀번호</label>
                    <span class="hint">일반 비밀번호 대신 '앱 비밀번호'를 설정하여 입력해주세요.</span>
                    <input type="password" id="password" placeholder="예: aBcDeFg123" required>
                </div>
            </div>

            <!-- AI 설정 -->
            <div class="section">
                <h2><span class="icon">🤖</span> AI (Gemini) 설정</h2>
                <div class="form-group">
                    <label for="apiKey">Gemini API 키</label>
                    <input type="password" id="apiKey" placeholder="AIzaSy..." required>
                </div>
                <div class="form-group">
                    <label for="model">사용할 모델</label>
                    <select id="model">
                        <option value="gemini-flash-latest" selected>Gemini Flash (빠름, 권장)</option>
                        <option value="gemini-pro">Gemini Pro (정확도 높음)</option>
                    </select>
                </div>
            </div>

            <!-- 필터 설정 -->
            <div class="section">
                <h2><span class="icon">🎯</span> 정리 방식 (Preferences) 설정</h2>

                <div class="form-group">
                    <label for="vipMode">요약할 메일 기준</label>
                    <select id="vipMode" onchange="toggleVipInputs()">
                        <option value="folder" selected>특정 편지함(폴더)에 있는 메일만</option>
                        <option value="senders">특정 보낸 사람들의 메일만</option>
                    </select>
                </div>

                <div class="form-group" id="folderInputGroup">
                    <label for="vipFolderName">읽어올 편지함 이름</label>
                    <span class="hint">보통 안읽은 메일함, 뉴스레터함 등 (네이버 기준 기본 INBOX 등)</span>
                    <input type="text" id="vipFolderName" value="VIP_In">
                </div>

                <div class="form-group" id="sendersInputGroup" style="display: none;">
                    <label for="vipSenders">보낸 사람 이메일 (쉼표로 구분)</label>
                    <span class="hint">예: newsletter@toss.im, news@company.com</span>
                    <input type="text" id="vipSenders" placeholder="이메일 목록 입력">
                </div>

                <div class="form-group">
                    <label for="maxEmails">하루 최대 요약 수 (개)</label>
                    <input type="number" id="maxEmails" value="10" required>
                </div>
            </div>

            <button type="button" onclick="generateConfig()">📥 config.json 다운로드</button>
        </form>
    </div>

    <script>
        function toggleVipInputs() {
            const mode = document.getElementById("vipMode").value;
            if (mode === "folder") {
                document.getElementById("folderInputGroup").style.display = "block";
                document.getElementById("sendersInputGroup").style.display = "none";
            } else {
                document.getElementById("folderInputGroup").style.display = "none";
                document.getElementById("sendersInputGroup").style.display = "block";
            }
        }

        function generateConfig() {
            // 입력값 가져오기
            const server = document.getElementById("server").value.trim();
            const port = parseInt(document.getElementById("port").value, 10);
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value.trim();

            const apiKey = document.getElementById("apiKey").value.trim();
            const model = document.getElementById("model").value;

            const vipMode = document.getElementById("vipMode").value;
            const vipFolderName = document.getElementById("vipFolderName").value.trim();
            const sendersRaw = document.getElementById("vipSenders").value.trim();
            const maxEmails = parseInt(document.getElementById("maxEmails").value, 10);

            // VIP 발신자 배열 변환
            let vipSenders = [];
            if (sendersRaw !== "") {
                vipSenders = sendersRaw.split(',').map(s => s.trim()).filter(s => s !== "");
            }

            // 필수 값 검사 (간단하게)
            if (!email || !password || !apiKey) {
                alert("이메일, 앱 비밀번호, Gemini API 키는 필수 입력 항목입니다.");
                return;
            }

            // JSON 객체 구성
            const configJson = {
                "imap": {
                    "server": server,
                    "port": port,
                    "email": email,
                    "password": password
                },
                "gemini": {
                    "api_key": apiKey,
                    "model": model
                },
                "preferences": {
                    "vip_mode": vipMode,
                    "vip_folder_name": vipMode === "folder" ? vipFolderName : "",
                    "vip_senders": vipSenders,
                    "max_emails_per_day": maxEmails || 10
                }
            };

            // JSON 문자열로 변환 파일 생성
            const jsonString = JSON.stringify(configJson, null, 4);
            const blob = new Blob([jsonString], { type: "application/json" });
            const url = URL.createObjectURL(blob);

            // 다운로드 트리거
            const a = document.createElement('a');
            a.href = url;
            a.download = 'config.json';
            document.body.appendChild(a);
            a.click();

            // 정리
            setTimeout(() => {
                document.body.removeChild(a);
                window.URL.revokeObjectURL(url);
            }, 0);
        }
    </script>

</body>

</html>
